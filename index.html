<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>삼성전자 노동조합 조합원 현황</title>
  <style>
    :root {
      --bg: #0D1117;
      --surface: #161B22;
      --surface-2: #1C2128;
      --border: #30363D;
      --text: #E6EDF3;
      --muted: #7D8590;
      --pos: #3FB950;
      --neg: #F85149;
      --zero: #7D8590;
      --accent: #58A6FF;
      --today-bg: rgba(56, 139, 253, 0.06);
      --today-border: rgba(56, 139, 253, 0.4);
      --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2.5rem 1.25rem;
    }

    .wrap { max-width: 1000px; margin: 0 auto; }

    /* ── header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .logo-group h1 {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .logo-group p {
      margin-top: 0.25rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .status-group {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.375rem;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      background: rgba(63, 185, 80, 0.1);
      border: 1px solid rgba(63, 185, 80, 0.3);
      border-radius: 20px;
      padding: 0.25rem 0.625rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--pos);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pos);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    #refresh-time {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── summary cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    .card.total {
      border-color: rgba(88, 166, 255, 0.35);
    }

    .card-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .card-value {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .card.total .card-value { color: var(--accent); }

    .card-diff {
      margin-top: 0.375rem;
      font-size: 0.75rem;
      font-family: var(--mono);
    }

    .card-diff.pos { color: var(--pos); }
    .card-diff.neg { color: var(--neg); }
    .card-diff.zero { color: var(--muted); }

    /* ── table ── */
    .table-outer {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
      white-space: nowrap;
    }

    thead tr { background: var(--surface-2); }

    thead th {
      padding: 0.625rem 0.875rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-align: right;
      border-bottom: 1px solid var(--border);
    }

    thead th.date-col { text-align: left; }

    thead .group-header {
      text-align: center;
      border-left: 1px solid var(--border);
      padding: 0.375rem 0.875rem;
      font-size: 0.7rem;
      color: var(--muted);
    }

    tbody td {
      padding: 0.5rem 0.875rem;
      font-family: var(--mono);
      text-align: right;
      border-bottom: 1px solid rgba(48, 54, 61, 0.6);
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody td.date-cell {
      font-family: var(--sans);
      font-size: 0.78rem;
      color: var(--muted);
      text-align: left;
    }

    tbody td.group-first { border-left: 1px solid var(--border); }

    /* base row */
    tr.base td.date-cell::after {
      content: ' [기준]';
      color: var(--accent);
      font-size: 0.68rem;
    }

    /* today row */
    tr.today {
      background: var(--today-bg);
    }

    tr.today td.date-cell {
      color: var(--accent);
      font-weight: 600;
    }

    /* change cells */
    .pos { color: var(--pos); }
    .neg { color: var(--neg); }
    .zero { color: var(--muted); }
    .pending { color: var(--muted); font-family: var(--sans); font-size: 0.72rem; }

    /* ── footer ── */
    .table-footer {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      padding: 0.625rem 0.875rem;
      background: var(--surface-2);
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .table-footer span { display: flex; align-items: center; gap: 0.375rem; }

    /* ── state messages ── */
    .msg {
      padding: 3rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .msg.error { color: var(--neg); }

    /* ── bottom note ── */
    footer {
      margin-top: 1.25rem;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
    }

    @media (max-width: 600px) {
      body { padding: 1.5rem 1rem; }
      header { flex-direction: column; }
      .status-group { align-items: flex-start; }
      .card-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-group">
      <h1>삼성전자 노동조합 조합원 현황</h1>
      <p>3조합(SECU) · 4조합(NSEU) · 5조합(SELU) — GitHub Actions 자동 수집</p>
    </div>
    <div class="status-group">
      <div class="live-badge"><div class="dot"></div> 30분마다 자동 갱신</div>
      <div id="refresh-time">로딩 중...</div>
    </div>
  </header>

  <div class="cards" id="cards"></div>

  <div class="table-outer">
    <div class="table-scroll">
      <div id="table-area"><div class="msg">데이터를 불러오는 중...</div></div>
    </div>
    <div class="table-footer" id="table-footer"></div>
  </div>

  <footer>
    <a href="https://github.com/loverpsw/union-tracker" target="_blank"
       style="color: var(--muted); text-decoration: none;">
      ↗ loverpsw/union-tracker
    </a>
  </footer>

</div>
<script>
const DATA_URL = 'https://raw.githubusercontent.com/loverpsw/union-tracker/main/data.json';

const SEED = [
  { date: '2026-05-01', secu: 2359,  nseu: 17789, selu: 75170 },
  { date: '2026-05-02', secu: 2359,  nseu: 17789, selu: 74750 },
  { date: '2026-05-03', secu: 2359,  nseu: 17789, selu: 74750 },
  { date: '2026-05-04', secu: 2359,  nseu: 17721, selu: 74373 },
  { date: '2026-05-05', secu: 2359,  nseu: 17721, selu: 74373 },
  { date: '2026-05-06', secu: 2360,  nseu: 17655, selu: 74215 },
  { date: '2026-05-07', secu: 2360,  nseu: 16498, selu: 73430 },
  { date: '2026-05-08', secu: 2360,  nseu: 15920, selu: 73306 },
  { date: '2026-05-09', secu: 2360,  nseu: 15920, selu: 73030 },
  { date: '2026-05-10', secu: 2360,  nseu: 15920, selu: 72930 },
  { date: '2026-05-11', secu: 2360,  nseu: 15462, selu: 72875 },
  { date: '2026-05-12', secu: 2360,  nseu: 15462, selu: 72750 },
  { date: '2026-05-13', secu: 2360,  nseu: 15462, selu: 72725 },
  { date: '2026-05-14', secu: 2438,  nseu: 15462, selu: 72405 },
  { date: '2026-05-15', secu: 2602,  nseu: 15266, selu: 71750 },
  { date: '2026-05-16', secu: 2602,  nseu: 15266, selu: 71765 },
  { date: '2026-05-17', secu: 2602,  nseu: 15266, selu: 71625 },
  { date: '2026-05-18', secu: 2602,  nseu: 15182, selu: 71375 },
  { date: '2026-05-19', secu: 3019,  nseu: 15123, selu: 70965 },
  { date: '2026-05-20', secu: 3409,  nseu: 15123, selu: 70985 },
  { date: '2026-05-21', secu: 11172, nseu: 16286, selu: 70850 },
  { date: '2026-05-22', secu: 12893, nseu: 19957, selu: 71075 },
  { date: '2026-05-23', secu: 13133, nseu: 19957, selu: 71235 },
  { date: '2026-05-24', secu: 13133, nseu: 19957, selu: 71235 },
  { date: '2026-05-25', secu: 13133, nseu: 19957, selu: 71235 },
  { date: '2026-05-26', secu: 14204, nseu: 20306, selu: 71155 },
  { date: '2026-05-27', secu: 14453, nseu: 20306, selu: 71040 },
  { date: '2026-05-28', secu: 16290, nseu: 20600, selu: 69935 },
  { date: '2026-05-29', secu: 18101, nseu: 20604, selu: 67860 },
  { date: '2026-05-30', secu: 18101, nseu: 20604, selu: 67860 },
  { date: '2026-05-31', secu: 18101, nseu: 20604, selu: 67860 },
  { date: '2026-06-01', secu: 19601, nseu: 20758, selu: 66150 },
  { date: '2026-06-02', secu: 20368, nseu: 20909, selu: 65870 },
  { date: '2026-06-03', secu: 20368, nseu: 20909, selu: 65290 },
  { date: '2026-06-04', secu: 21015, nseu: 20968, selu: 58270 },
  { date: '2026-06-05', secu: 22222, nseu: 20996, selu: 58470 },
  { date: '2026-06-06', secu: 22222, nseu: 20996, selu: 57870 },
  { date: '2026-06-07', secu: 22222, nseu: 20996, selu: 57870 },
  { date: '2026-06-08', secu: 22680, nseu: 20996, selu: 57870 },
  { date: '2026-06-09', secu: 23406, nseu: 21531, selu: 57480 },
  { date: '2026-06-10', secu: 23902, nseu: 21059, selu: 57280 },
  { date: '2026-06-11', secu: 24301, nseu: 21023, selu: 57185 },
  { date: '2026-06-12', secu: 24495, nseu: 21028, selu: 57030 },
  { date: '2026-06-13', secu: 24495, nseu: 21028, selu: 56810 },
  { date: '2026-06-14', secu: 24694, nseu: 21028, selu: 56810 },
];

const DAYS = ['일', '월', '화', '수', '목', '금', '토'];

function todayKST() {
  const kst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  return [
    kst.getFullYear(),
    String(kst.getMonth() + 1).padStart(2, '0'),
    String(kst.getDate()).padStart(2, '0'),
  ].join('-');
}

function fmtDateLabel(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dow = DAYS[new Date(y, m - 1, d).getDay()];
  return `${String(y).slice(2)}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')} (${dow})`;
}

function comma(n) { return n.toLocaleString('ko-KR'); }

function renderChange(diff, cls) {
  if (diff === null) return `<span class="pending">-</span>`;
  if (diff === 0)    return `<span class="zero">0</span>`;
  if (diff > 0)      return `<span class="pos">${comma(diff)}</span>`;
  return `<span class="neg">(${comma(Math.abs(diff))})</span>`;
}

async function load() {
  let ghRaw = [];
  try {
    const res = await fetch(DATA_URL + '?_=' + Date.now());
    ghRaw = await res.json();
  } catch (e) {
    document.getElementById('table-area').innerHTML =
      `<div class="msg error">데이터 로드 실패: ${e.message}</div>`;
    return;
  }

  /* merge */
  const map = {};
  SEED.forEach(r => { map[r.date] = { ...r, _meta: null }; });
function metaMatchesDate(metaStr, recordDate) {
    if (!metaStr) return false;
    if (metaStr.includes('-')) return metaStr.startsWith(recordDate);
    const m = metaStr.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if (!m) return false;
    const d = `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
    return d === recordDate;
  }

  ghRaw.forEach(r => {
    const recDate = r.date;
    map[recDate] = {
      date: recDate,
      secu: metaMatchesDate(r.secu.date, recDate) ? parseInt(r.secu.count, 10) : null,
      nseu: metaMatchesDate(r.nseu.date, recDate) ? parseInt(r.nseu.count, 10) : null,
      selu: metaMatchesDate(r.selu.date, recDate) ? parseInt(r.selu.count, 10) : null,
      _meta: { secu: r.secu.date, nseu: r.nseu.date, selu: r.selu.date },
    };
  });

  const today = todayKST();
  if (!map[today]) map[today] = { date: today, secu: null, nseu: null, selu: null, _meta: null };

  const rows = Object.values(map).sort((a, b) => a.date.localeCompare(b.date));

  /* compute diffs */
  rows.forEach((r, i) => {
    if (i === 0) { r._diff = { secu: 0, nseu: 0, selu: 0 }; return; }
    const p = rows[i - 1];
    r._diff = {
      secu: r.secu !== null && p.secu !== null ? r.secu - p.secu : null,
      nseu: r.nseu !== null && p.nseu !== null ? r.nseu - p.nseu : null,
      selu: r.selu !== null && p.selu !== null ? r.selu - p.selu : null,
    };
  });

  /* summary cards — 각 조합 독립적으로 최신값 사용 */
  const rev = [...rows].reverse();
  const unionNames = ['3조합 (SECU)', '4조합 (NSEU)', '5조합 (SELU)'];
  const unionKeys  = ['secu', 'nseu', 'selu'];
  const unionUrls  = ['https://secunion.co.kr', 'https://samsunglabor.co.kr', 'https://selunion.co.kr'];

  const latests = unionKeys.map(k => rev.find(r => r[k] !== null));
  const prevs   = unionKeys.map((k, i) => {
    const lr = latests[i];
    if (!lr) return null;
    return rows.slice(0, rows.indexOf(lr)).reverse().find(r => r[k] !== null);
  });

  let cardHtml = '';

  /* 합계 카드: 각 조합의 최신값 합산 */
  const totalVals = latests.map((lr, i) => lr ? lr[unionKeys[i]] : null);
  if (totalVals.every(v => v !== null)) {
    const total = totalVals.reduce((a, b) => a + b, 0);
    const prevTotal = prevs.every(p => p !== null)
      ? prevs.reduce((a, p, i) => a + p[unionKeys[i]], 0) : null;
    const totalDiff = prevTotal !== null ? total - prevTotal : 0;
    const diffCls  = totalDiff > 0 ? 'pos' : totalDiff < 0 ? 'neg' : 'zero';
    const diffSign = totalDiff > 0 ? '▲ ' : totalDiff < 0 ? '▼ ' : '';
    const diffText = totalDiff !== 0
      ? (totalDiff > 0 ? comma(totalDiff) : `(${comma(Math.abs(totalDiff))})`) : '전일 동일';
    cardHtml += `<div class="card total">
      <div class="card-label">합계</div>
      <div class="card-value">${comma(total)}</div>
      <div class="card-diff ${diffCls}">${diffSign}${diffText}</div>
    </div>`;
  }

  /* 조합별 카드 */
  unionKeys.forEach((k, i) => {
    const lr = latests[i];
    const pr = prevs[i];
    if (!lr) return;
    const v = lr[k];
    const d = pr ? v - pr[k] : 0;
    const dc = d > 0 ? 'pos' : d < 0 ? 'neg' : 'zero';
    const ds = d > 0 ? '▲ ' + comma(d) : d < 0 ? '▼ (' + comma(Math.abs(d)) + ')' : '전일 동일';
    cardHtml += `<div class="card">
      <div class="card-label" style="display:flex;justify-content:space-between;align-items:center;">
        <span>${unionNames[i]}</span>
        <a href="${unionUrls[i]}" target="_blank" style="font-size:0.65rem;color:var(--accent);text-decoration:none;border:1px solid rgba(88,166,255,0.3);border-radius:4px;padding:2px 6px;white-space:nowrap;">홈페이지 ↗</a>
      </div>
      <div class="card-value">${comma(v)}</div>
      <div class="card-diff ${dc}">${ds}</div>
    </div>`;
  });
  document.getElementById('cards').innerHTML = cardHtml;

  /* table */
  let tableHtml = `<table>
    <colgroup>
      <col style="min-width:130px">
      <col><col style="min-width:72px">
      <col><col style="min-width:72px">
      <col><col style="min-width:72px">
      <col><col style="min-width:72px">
    </colgroup>
    <thead>
      <tr>
        <th class="date-col" rowspan="2" style="border-right:1px solid var(--border)">일자</th>
        <th colspan="2" class="group-header">3조합</th>
        <th colspan="2" class="group-header">4조합</th>
        <th colspan="2" class="group-header">5조합</th>
        <th colspan="2" class="group-header">합계</th>
      </tr>
      <tr>
        <th class="group-first">조합원수</th><th>증감</th>
        <th class="group-first">조합원수</th><th>증감</th>
        <th class="group-first">조합원수</th><th>증감</th>
        <th class="group-first">조합원수</th><th>증감</th>
      </tr>
    </thead>
    <tbody>`;

  rows.forEach(r => {
    const isToday = r.date === today;
    const isBase  = !!r.base;
    const rowCls  = isToday ? 'today' : (isBase ? 'base' : '');
    const label   = fmtDateLabel(r.date);

    const total = (r.secu !== null && r.nseu !== null && r.selu !== null)
      ? r.secu + r.nseu + r.selu : null;
    const totalDiff = r._diff && r._diff.secu !== null && r._diff.nseu !== null && r._diff.selu !== null
      ? r._diff.secu + r._diff.nseu + r._diff.selu : null;

    const keys = ['secu', 'nseu', 'selu'];
    let cells = '';
    keys.forEach(k => {
      const v = r[k];
      const d = r._diff ? r._diff[k] : null;
      const countHtml = v !== null ? comma(v) : `<span class="pending">업데이트중</span>`;
      cells += `<td class="group-first">${countHtml}</td>`;
      cells += `<td>${renderChange(d, null)}</td>`;
    });

    const totalCountHtml = total !== null ? comma(total) : `<span class="pending">업데이트중</span>`;
    cells += `<td class="group-first">${totalCountHtml}</td>`;
    cells += `<td>${total !== null ? renderChange(totalDiff, null) : `<span class="pending">-</span>`}</td>`;

    tableHtml += `<tr class="${rowCls}">
      <td class="date-cell" style="border-right:1px solid var(--border)">${label}</td>
      ${cells}
    </tr>`;
  });

  tableHtml += '</tbody></table>';
  document.getElementById('table-area').innerHTML = tableHtml;

  /* footer timestamps */
  const lastMeta = [...rows].reverse().find(r => r._meta)?._meta;
  if (lastMeta) {
    document.getElementById('table-footer').innerHTML =
      `<span>3조합 갱신: ${lastMeta.secu}</span>` +
      `<span>4조합 갱신: ${lastMeta.nseu}</span>` +
      `<span>5조합 갱신: ${lastMeta.selu}</span>`;
  }

  /* refresh timestamp */
  const now = new Date().toLocaleString('ko-KR', {
    timeZone: 'Asia/Seoul', hour12: false,
    month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit',
  });
  document.getElementById('refresh-time').textContent = `마지막 조회: ${now}`;
}

load();
setInterval(load, 30 * 60 * 1000);
</script>
</body>
</html>
